<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        var key = "rustyshop-theme-mode";
        try {
          var stored = window.localStorage.getItem(key);
          if (stored === "light" || stored === "dark") {
            document.documentElement.setAttribute("data-theme", stored);
          } else {
            document.documentElement.removeAttribute("data-theme");
          }
        } catch (_error) {
          document.documentElement.removeAttribute("data-theme");
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        font-family: "Nunito", "Trebuchet MS", "Segoe UI", sans-serif;
        background: #160f0b;
        color: #fff7f1;
      }

      .boot-splash {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        overflow: hidden;
        background: #160f0b;
      }

      .boot-splash__image,
      .boot-splash__overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .boot-splash__image {
        object-fit: cover;
        object-position: center center;
        user-select: none;
        -webkit-user-drag: none;
      }

      .boot-splash__overlay {
        background:
          linear-gradient(180deg, rgba(11, 7, 4, 0.04) 0%, rgba(11, 7, 4, 0.18) 48%, rgba(11, 7, 4, 0.74) 100%),
          linear-gradient(180deg, transparent 52%, rgba(11, 7, 4, 0.82) 100%);
      }

      .boot-splash__footer {
        position: absolute;
        inset-inline: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        padding: 32px 20px calc(30px + env(safe-area-inset-bottom));
      }

      .boot-splash__loading {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        padding: 14px 20px;
        border-radius: 999px;
        background: rgba(19, 12, 8, 0.34);
        color: #fff7f1;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .boot-splash__dots {
        display: inline-flex;
        min-width: 24px;
      }

      .boot-splash__dots span {
        display: inline-block;
        animation: bootDotFade 1.2s ease-in-out infinite;
        opacity: 0.28;
      }

      .boot-splash__dots span:nth-child(2) {
        animation-delay: 0.16s;
      }

      .boot-splash__dots span:nth-child(3) {
        animation-delay: 0.32s;
      }

      @keyframes bootDotFade {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.24;
        }

        50% {
          transform: translateY(-1px);
          opacity: 1;
        }
      }
    </style>
    <title>RustyShop</title>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash" aria-hidden="true">
        <img class="boot-splash__image" src="./loadpage.png" alt="" />
        <div class="boot-splash__overlay"></div>
        <section class="boot-splash__footer">
          <div class="boot-splash__loading" aria-label="Загрузка">
            <span>Загрузка</span>
            <span class="boot-splash__dots" aria-hidden>
              <span>.</span>
              <span>.</span>
              <span>.</span>
            </span>
          </div>
        </section>
      </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
